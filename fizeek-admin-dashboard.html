<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizeek Admin — Moderation Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --text: #e5e5e5;
    --text2: #a3a3a3;
    --text3: #666;
    --accent: #79E9B7;
    --accent-dim: rgba(121,233,183,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
  }
  
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  
  /* Login Screen */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }
  
  .login-card h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #fff;
  }
  
  .login-card .subtitle {
    color: var(--text3);
    font-size: 14px;
    margin-bottom: 32px;
  }
  
  .form-group {
    margin-bottom: 16px;
  }
  
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
  }
  
  .form-group input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  
  .form-group input:focus {
    border-color: var(--accent);
  }
  
  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  
  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
    padding: 12px;
    margin-top: 8px;
  }
  
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .btn-danger {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.2);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); }
  
  .btn-warn {
    background: var(--amber-dim);
    color: var(--amber);
    border: 1px solid rgba(245,158,11,0.2);
  }
  .btn-warn:hover { background: rgba(245,158,11,0.2); }
  
  .btn-ban {
    background: rgba(239,68,68,0.08);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.15);
  }
  .btn-ban:hover { background: rgba(239,68,68,0.15); }
  
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  
  .login-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  
  /* Dashboard Layout */
  .dashboard { display: none; }
  
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  
  .top-bar h1 {
    font-size: 18px;
    font-weight: 700;
  }
  
  .top-bar h1 span {
    color: var(--accent);
  }
  
  .top-bar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .user-info {
    font-size: 13px;
    color: var(--text3);
  }
  
  .main-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px;
  }
  
  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  
  .stat-label {
    font-size: 12px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
  }
  
  .stat-value.pending { color: var(--amber); }
  .stat-value.actioned { color: var(--accent); }
  
  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  
  .tab {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  
  .tab .badge {
    display: inline-block;
    background: var(--red-dim);
    color: var(--red);
    font-size: 11px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 6px;
  }
  
  /* Report Cards */
  .reports-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  
  .report-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .report-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .report-type {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 6px;
  }
  
  .report-type.post { background: var(--blue-dim); color: var(--blue); }
  .report-type.comment { background: var(--amber-dim); color: var(--amber); }
  .report-type.user { background: rgba(168,85,247,0.12); color: #a855f7; }
  
  .report-reason {
    font-size: 13px;
    color: var(--text2);
  }
  
  .report-reason strong {
    color: var(--text);
  }
  
  .report-time {
    font-size: 12px;
    color: var(--text3);
  }
  
  .report-status {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
  }
  
  .report-status.pending { background: var(--amber-dim); color: var(--amber); }
  .report-status.dismissed { background: var(--surface2); color: var(--text3); }
  .report-status.actioned { background: var(--accent-dim); color: var(--accent); }
  
  .report-body {
    padding: 20px;
  }
  
  .report-content-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  
  .report-content-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  
  .report-content-text {
    font-size: 14px;
    color: var(--text);
    white-space: pre-wrap;
  }
  
  .report-content-image {
    max-width: 300px;
    max-height: 300px;
    border-radius: 8px;
    margin-top: 8px;
  }
  
  .report-users {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  
  .report-users strong { color: var(--text); font-weight: 600; }
  
  .report-description {
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
    margin-bottom: 16px;
  }
  
  .report-actions {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.01);
  }
  
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  
  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
  }
  
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text3);
  }
  
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    color: var(--accent);
    display: none;
    z-index: 100;
    animation: slideUp 0.3s ease;
  }
  
  .toast.error { color: var(--red); }
  
  @keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    display: none;
  }
  
  .confirm-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    max-width: 420px;
    width: 90%;
  }
  
  .confirm-card h3 {
    font-size: 18px;
    margin-bottom: 8px;
    color: #fff;
  }
  
  .confirm-card p {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 20px;
  }
  
  .confirm-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  
  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .main-content { padding: 16px; }
    .top-bar { padding: 12px 16px; }
    .report-actions { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Fizeek Admin</h1>
    <p class="subtitle">Moderation Dashboard</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="top-bar">
    <h1><span>Fizeek</span> Admin</h1>
    <div class="top-bar-right">
      <span class="user-info" id="userEmail"></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  
  <div class="main-content">
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value pending" id="statPending">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Actioned</div>
        <div class="stat-value actioned" id="statActioned">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Dismissed</div>
        <div class="stat-value" id="statDismissed">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Reports</div>
        <div class="stat-value" id="statTotal">-</div>
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab active" data-filter="pending" onclick="switchTab(this)">
        Pending <span class="badge" id="pendingBadge">0</span>
      </button>
      <button class="tab" data-filter="actioned" onclick="switchTab(this)">Actioned</button>
      <button class="tab" data-filter="dismissed" onclick="switchTab(this)">Dismissed</button>
      <button class="tab" data-filter="all" onclick="switchTab(this)">All</button>
    </div>
    
    <div class="reports-list" id="reportsList">
      <div class="loading">Loading reports...</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-card">
    <h3 id="confirmTitle">Confirm Action</h3>
    <p id="confirmMessage">Are you sure?</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirmBtn" onclick="executeConfirm()">Confirm</button>
    </div>
  </div>
</div>

<script>
// === CONFIG ===
// Replace these with your actual Supabase credentials
const SUPABASE_URL = 'https://rfwaaxoaxqxocaadjqfg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmd2FheG9heHF4b2NhYWRqcWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjUzNzczNTMsImV4cCI6MjA0MDk1MzM1M30.rZbu56Pdw7Tcs-EGUW19mDxs7on3M670VQm13lH26kA';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentFilter = 'pending';
let allReports = [];
let confirmCallback = null;

// === AUTH ===
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const isAdmin = await verifyAdmin(session.user.id);
    if (isAdmin) {
      showDashboard(session.user.email);
      return;
    }
  }
  showLogin();
}

async function verifyAdmin(userId) {
  const { data } = await supabase
    .from('profiles')
    .select('is_admin')
    .eq('id', userId)
    .single();
  return data?.is_admin === true;
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.style.display = 'none';
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if (error) {
    err.textContent = error.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }
  
  const isAdmin = await verifyAdmin(data.user.id);
  if (!isAdmin) {
    err.textContent = 'Access denied. Admin privileges required.';
    err.style.display = 'block';
    await supabase.auth.signOut();
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }
  
  showDashboard(data.user.email);
}

async function doLogout() {
  await supabase.auth.signOut();
  showLogin();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

function showDashboard(email) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('userEmail').textContent = email;
  loadReports();
}

// === REPORTS ===
async function loadReports() {
  document.getElementById('reportsList').innerHTML = '<div class="loading">Loading reports...</div>';
  
  const { data: reports, error } = await supabase
    .from('reports')
    .select(`
      *,
      reporter:profiles!reports_reporter_id_fkey(id, username, full_name),
      reported_user:profiles!reports_reported_user_id_fkey(id, username, full_name, is_banned),
      reported_post:posts!reports_reported_post_id_fkey(id, content, media_urls, user_id),
      reported_comment:comments!reports_reported_comment_id_fkey(id, content, user_id)
    `)
    .order('created_at', { ascending: false });
  
  if (error) {
    document.getElementById('reportsList').innerHTML = 
      `<div class="empty-state"><p>Error loading reports: ${error.message}</p></div>`;
    return;
  }
  
  allReports = reports || [];
  updateStats();
  renderReports();
}

function updateStats() {
  const pending = allReports.filter(r => r.status === 'pending').length;
  const actioned = allReports.filter(r => r.status === 'actioned').length;
  const dismissed = allReports.filter(r => r.status === 'dismissed').length;
  
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statActioned').textContent = actioned;
  document.getElementById('statDismissed').textContent = dismissed;
  document.getElementById('statTotal').textContent = allReports.length;
  document.getElementById('pendingBadge').textContent = pending;
  document.getElementById('pendingBadge').style.display = pending > 0 ? 'inline-block' : 'none';
}

function renderReports() {
  const filtered = currentFilter === 'all' 
    ? allReports 
    : allReports.filter(r => r.status === currentFilter);
  
  const container = document.getElementById('reportsList');
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#9745;</div>
        <p>No ${currentFilter === 'all' ? '' : currentFilter} reports</p>
      </div>`;
    return;
  }
  
  container.innerHTML = filtered.map(report => renderReportCard(report)).join('');
}

function renderReportCard(r) {
  const type = r.reported_post_id ? 'post' : r.reported_comment_id ? 'comment' : 'user';
  const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
  const reason = r.reason.replace(/_/g, ' ');
  const time = new Date(r.created_at).toLocaleDateString('en-US', { 
    month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' 
  });
  
  const reporterName = r.reporter?.username || r.reporter?.full_name || 'Unknown';
  const reportedName = r.reported_user?.username || r.reported_user?.full_name || 'Unknown';
  const isBanned = r.reported_user?.is_banned;
  
  let contentHtml = '';
  
  if (type === 'post' && r.reported_post) {
    const postText = r.reported_post.content || '(no caption)';
    const hasMedia = r.reported_post.media_urls && r.reported_post.media_urls.length > 0;
    contentHtml = `
      <div class="report-content-box">
        <div class="report-content-label">Reported Post</div>
        <div class="report-content-text">${escapeHtml(postText)}</div>
        ${hasMedia ? '<div style="margin-top:8px;font-size:12px;color:var(--text3)">📷 Post contains ' + r.reported_post.media_urls.length + ' image(s)</div>' : ''}
      </div>`;
  } else if (type === 'comment' && r.reported_comment) {
    contentHtml = `
      <div class="report-content-box">
        <div class="report-content-label">Reported Comment</div>
        <div class="report-content-text">${escapeHtml(r.reported_comment.content || '(empty)')}</div>
      </div>`;
  } else if (type === 'user') {
    contentHtml = `
      <div class="report-content-box">
        <div class="report-content-label">Reported User Profile</div>
        <div class="report-content-text">@${escapeHtml(reportedName)}</div>
      </div>`;
  }
  
  const isPending = r.status === 'pending';
  
  const actions = isPending ? `
    <div class="report-actions">
      <button class="btn btn-ghost btn-sm" onclick="dismissReport('${r.id}')">Dismiss</button>
      ${type === 'post' && r.reported_post_id ? `<button class="btn btn-danger btn-sm" onclick="deleteContent('post', '${r.reported_post_id}', '${r.id}')">Delete Post</button>` : ''}
      ${type === 'comment' && r.reported_comment_id ? `<button class="btn btn-danger btn-sm" onclick="deleteContent('comment', '${r.reported_comment_id}', '${r.id}')">Delete Comment</button>` : ''}
      ${r.reported_user_id && !isBanned ? `<button class="btn btn-ban btn-sm" onclick="banUser('${r.reported_user_id}', '${r.id}', '${escapeHtml(reportedName)}')">Ban @${escapeHtml(reportedName)}</button>` : ''}
      ${isBanned ? '<span style="font-size:12px;color:var(--red);padding:6px 14px;">User is banned</span>' : ''}
    </div>` : `
    <div class="report-actions">
      <span style="font-size:12px;color:var(--text3);padding:6px 0;">Status: ${r.status}</span>
      ${r.status === 'dismissed' && isPending === false ? `<button class="btn btn-ghost btn-sm" onclick="reopenReport('${r.id}')">Reopen</button>` : ''}
    </div>`;
  
  return `
    <div class="report-card">
      <div class="report-header">
        <div class="report-meta">
          <span class="report-type ${type}">${typeLabel}</span>
          <span class="report-reason"><strong>${reason}</strong></span>
          <span class="report-time">${time}</span>
        </div>
        <span class="report-status ${r.status}">${r.status}</span>
      </div>
      <div class="report-body">
        <div class="report-users">
          <span>Reported by: <strong>@${escapeHtml(reporterName)}</strong></span>
          <span>Against: <strong>@${escapeHtml(reportedName)}</strong>${isBanned ? ' <span style="color:var(--red);font-size:11px;">(BANNED)</span>' : ''}</span>
        </div>
        ${r.description ? `<div class="report-description">"${escapeHtml(r.description)}"</div>` : ''}
        ${contentHtml}
      </div>
      ${actions}
    </div>`;
}

// === ACTIONS ===
async function dismissReport(reportId) {
  const { error } = await supabase
    .from('reports')
    .update({ status: 'dismissed' })
    .eq('id', reportId);
  
  if (error) { showToast('Error: ' + error.message, true); return; }
  showToast('Report dismissed');
  loadReports();
}

async function reopenReport(reportId) {
  const { error } = await supabase
    .from('reports')
    .update({ status: 'pending' })
    .eq('id', reportId);
  
  if (error) { showToast('Error: ' + error.message, true); return; }
  showToast('Report reopened');
  loadReports();
}

function deleteContent(type, contentId, reportId) {
  showConfirm(
    `Delete ${type}?`,
    `This will permanently delete this ${type}. This cannot be undone.`,
    async () => {
      const table = type === 'post' ? 'posts' : 'comments';
      const { error: delError } = await supabase.from(table).delete().eq('id', contentId);
      if (delError) { showToast('Error deleting: ' + delError.message, true); return; }
      
      const { error: updError } = await supabase
        .from('reports')
        .update({ status: 'actioned' })
        .eq('id', reportId);
      if (updError) { showToast('Content deleted but report status failed to update', true); return; }
      
      showToast(`${type.charAt(0).toUpperCase() + type.slice(1)} deleted and report actioned`);
      loadReports();
    }
  );
}

function banUser(userId, reportId, username) {
  showConfirm(
    `Ban @${username}?`,
    `This will ban the user from the platform. Their content will remain but they won't be able to use the app.`,
    async () => {
      const { error: banError } = await supabase
        .from('profiles')
        .update({ is_banned: true })
        .eq('id', userId);
      if (banError) { showToast('Error banning: ' + banError.message, true); return; }
      
      const { error: updError } = await supabase
        .from('reports')
        .update({ status: 'actioned' })
        .eq('id', reportId);
      if (updError) { showToast('User banned but report status failed', true); return; }
      
      showToast(`@${username} has been banned`);
      loadReports();
    }
  );
}

// === UI HELPERS ===
function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  renderReports();
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = isError ? 'toast error' : 'toast';
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

function showConfirm(title, message, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  document.getElementById('confirmOverlay').style.display = 'flex';
  confirmCallback = callback;
}

function closeConfirm() {
  document.getElementById('confirmOverlay').style.display = 'none';
  confirmCallback = null;
}

async function executeConfirm() {
  if (confirmCallback) {
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.textContent = 'Processing...';
    await confirmCallback();
    btn.disabled = false;
    btn.textContent = 'Confirm';
    closeConfirm();
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
