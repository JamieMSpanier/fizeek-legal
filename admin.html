<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizeek Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0a;--s:#141414;--s2:#1c1c1c;--bd:rgba(255,255,255,0.08);--t:#e5e5e5;--t2:#a3a3a3;--t3:#666;--ac:#79E9B7;--acd:rgba(121,233,183,0.12);--rd:#ef4444;--rdd:rgba(239,68,68,0.12);--am:#f59e0b;--amd:rgba(245,158,11,0.12);--bl:#3b82f6;--bld:rgba(59,130,246,0.12)}
  body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--t);line-height:1.5;min-height:100vh}
  .login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .login-card{background:var(--s);border:1px solid var(--bd);border-radius:16px;padding:40px;width:100%;max-width:400px}
  .login-card h1{font-size:24px;font-weight:700;margin-bottom:4px;color:#fff}
  .login-card .sub{color:var(--t3);font-size:14px;margin-bottom:32px}
  .fg{margin-bottom:16px}
  .fg label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
  .fg input{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--t);font-size:15px;font-family:inherit;outline:none}
  .fg input:focus{border-color:var(--ac)}
  .btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s}
  .btn-p{background:var(--ac);color:#000;width:100%;padding:12px;margin-top:8px}
  .btn-p:hover{opacity:.9}.btn-p:disabled{opacity:.5;cursor:not-allowed}
  .btn-d{background:var(--rdd);color:var(--rd);border:1px solid rgba(239,68,68,0.2)}.btn-d:hover{background:rgba(239,68,68,0.2)}
  .btn-g{background:transparent;color:var(--t2);border:1px solid var(--bd)}.btn-g:hover{background:var(--s2)}
  .btn-b{background:rgba(239,68,68,0.08);color:#f87171;border:1px solid rgba(239,68,68,0.15)}.btn-b:hover{background:rgba(239,68,68,0.15)}
  .btn-sm{padding:6px 14px;font-size:13px}
  .lerr{color:var(--rd);font-size:13px;margin-top:12px;display:none}
  .dash{display:none}
  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--bd);background:var(--s);position:sticky;top:0;z-index:10}
  .top h1{font-size:18px;font-weight:700}.top h1 span{color:var(--ac)}
  .top-r{display:flex;align-items:center;gap:16px}
  .uinf{font-size:13px;color:var(--t3)}
  .mc{max-width:1100px;margin:0 auto;padding:32px}
  .sr{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
  .sc{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:20px}
  .sl{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .sv{font-size:28px;font-weight:700;color:#fff}.sv.p{color:var(--am)}.sv.a{color:var(--ac)}
  .tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--bd)}
  .tab{padding:10px 20px;font-size:14px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
  .tab:hover{color:var(--t)}.tab.act{color:var(--ac);border-bottom-color:var(--ac)}
  .badge{display:inline-block;background:var(--rdd);color:var(--rd);font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:6px}
  .rl{display:flex;flex-direction:column;gap:12px}
  .rc{background:var(--s);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
  .rh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
  .rm{display:flex;align-items:center;gap:12px}
  .rt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:6px}
  .rt.post{background:var(--bld);color:var(--bl)}.rt.comment{background:var(--amd);color:var(--am)}.rt.user{background:rgba(168,85,247,0.12);color:#a855f7}
  .rr{font-size:13px;color:var(--t2)}.rr strong{color:var(--t)}
  .rti{font-size:12px;color:var(--t3)}
  .rs{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px}
  .rs.pending{background:var(--amd);color:var(--am)}.rs.dismissed{background:var(--s2);color:var(--t3)}.rs.actioned{background:var(--acd);color:var(--ac)}
  .rb{padding:20px}
  .rcb{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:12px}
  .rcl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .rct{font-size:14px;color:var(--t);white-space:pre-wrap}
  .ru{display:flex;gap:24px;font-size:13px;color:var(--t2);margin-bottom:16px}.ru strong{color:var(--t);font-weight:600}
  .rde{font-size:13px;color:var(--t2);font-style:italic;margin-bottom:16px}
  .ra{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--bd);background:rgba(255,255,255,0.01);flex-wrap:wrap}
  .es{text-align:center;padding:60px 20px;color:var(--t3)}
  .ld{text-align:center;padding:40px;color:var(--t3)}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--s);border:1px solid var(--bd);border-radius:10px;padding:12px 20px;font-size:14px;color:var(--ac);display:none;z-index:100}
  .toast.err{color:var(--rd)}
  .cov{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:50}
  .cov.show{display:flex}
  .cc{background:var(--s);border:1px solid var(--bd);border-radius:14px;padding:28px;max-width:420px;width:90%}
  .cc h3{font-size:18px;margin-bottom:8px;color:#fff}
  .cc p{font-size:14px;color:var(--t2);margin-bottom:20px}
  .ca{display:flex;gap:8px;justify-content:flex-end}
  @media(max-width:768px){.sr{grid-template-columns:repeat(2,1fr)}.mc{padding:16px}.top{padding:12px 16px}}
</style>
</head>
<body>

<div class="login" id="ls">
  <div class="login-card">
    <h1>Fizeek Admin</h1>
    <p class="sub">Moderation Dashboard</p>
    <div class="fg">
      <label>Email</label>
      <input type="email" id="le" placeholder="your@email.com">
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="lp" placeholder="Password" id="lpw">
    </div>
    <button class="btn btn-p" id="lb">Sign In</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div class="dash" id="dash">
  <div class="top">
    <h1><span>Fizeek</span> Admin</h1>
    <div class="top-r">
      <span class="uinf" id="ue"></span>
      <button class="btn btn-g btn-sm" id="lob">Sign Out</button>
    </div>
  </div>
  <div class="mc">
    <div class="sr">
      <div class="sc"><div class="sl">Pending</div><div class="sv p" id="sp">-</div></div>
      <div class="sc"><div class="sl">Actioned</div><div class="sv a" id="sa">-</div></div>
      <div class="sc"><div class="sl">Dismissed</div><div class="sv" id="sd">-</div></div>
      <div class="sc"><div class="sl">Total</div><div class="sv" id="st">-</div></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="rl" id="rl"><div class="ld">Loading reports...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="cov" id="cov">
  <div class="cc">
    <h3 id="ct">Confirm</h3>
    <p id="cm">Are you sure?</p>
    <div class="ca">
      <button class="btn btn-g btn-sm" id="ccn">Cancel</button>
      <button class="btn btn-d btn-sm" id="cok">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ============================================
// REPLACE THESE WITH YOUR ACTUAL CREDENTIALS
// ============================================
const SUPABASE_URL = 'https://rfwaaxoaxqxocaadjqfg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmd2FheG9heHF4b2NhYWRqcWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjUzNzczNTMsImV4cCI6MjA0MDk1MzM1M30.rZbu56Pdw7Tcs-EGUW19mDxs7on3M670VQm13lH26kA';
// ============================================

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let filter = 'pending';
let reports = [];
let confirmFn = null;

// Elements
const $ls = document.getElementById('ls');
const $dash = document.getElementById('dash');
const $le = document.getElementById('le');
const $lp = document.getElementById('lp');
const $lb = document.getElementById('lb');
const $lerr = document.getElementById('lerr');
const $ue = document.getElementById('ue');
const $rl = document.getElementById('rl');
const $tabs = document.getElementById('tabs');
const $toast = document.getElementById('toast');
const $cov = document.getElementById('cov');

// Auth
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session && await isAdmin(session.user.id)) {
    showDash(session.user.email);
  }
}

async function isAdmin(uid) {
  const { data } = await sb.from('profiles').select('is_admin').eq('id', uid).single();
  return data?.is_admin === true;
}

$lb.addEventListener('click', async () => {
  $lb.disabled = true;
  $lb.textContent = 'Signing in...';
  $lerr.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({
    email: $le.value, password: $lp.value
  });

  if (error) {
    $lerr.textContent = error.message;
    $lerr.style.display = 'block';
    $lb.disabled = false;
    $lb.textContent = 'Sign In';
    return;
  }

  if (!(await isAdmin(data.user.id))) {
    $lerr.textContent = 'Access denied. Admin privileges required.';
    $lerr.style.display = 'block';
    await sb.auth.signOut();
    $lb.disabled = false;
    $lb.textContent = 'Sign In';
    return;
  }

  showDash(data.user.email);
});

$lp.addEventListener('keydown', (e) => { if (e.key === 'Enter') $lb.click(); });

document.getElementById('lob').addEventListener('click', async () => {
  await sb.auth.signOut();
  $ls.style.display = 'flex';
  $dash.style.display = 'none';
});

function showDash(email) {
  $ls.style.display = 'none';
  $dash.style.display = 'block';
  $ue.textContent = email;
  $lb.disabled = false;
  $lb.textContent = 'Sign In';
  buildTabs();
  loadReports();
}

// Tabs
function buildTabs() {
  $tabs.innerHTML = ['pending','actioned','dismissed','all'].map(f =>
    `<button class="tab${f===filter?' act':''}" data-f="${f}">${f.charAt(0).toUpperCase()+f.slice(1)}${f==='pending'?'<span class="badge" id="pb">0</span>':''}</button>`
  ).join('');
  $tabs.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    filter = t.dataset.f;
    $tabs.querySelectorAll('.tab').forEach(x => x.classList.remove('act'));
    t.classList.add('act');
    render();
  }));
}

// Reports
async function loadReports() {
  $rl.innerHTML = '<div class="ld">Loading reports...</div>';

  const { data, error } = await sb.from('reports').select(`
    *,
    reporter:profiles!reports_reporter_id_fkey(id,username,full_name),
    reported_user:profiles!reports_reported_user_id_fkey(id,username,full_name,is_banned),
    reported_post:posts!reports_reported_post_id_fkey(id,content,media_urls,user_id),
    reported_comment:comments!reports_reported_comment_id_fkey(id,content,user_id)
  `).order('created_at', { ascending: false });

  if (error) {
    $rl.innerHTML = `<div class="es">Error: ${esc(error.message)}</div>`;
    return;
  }

  reports = data || [];
  updateStats();
  render();
}

function updateStats() {
  const p = reports.filter(r => r.status === 'pending').length;
  document.getElementById('sp').textContent = p;
  document.getElementById('sa').textContent = reports.filter(r => r.status === 'actioned').length;
  document.getElementById('sd').textContent = reports.filter(r => r.status === 'dismissed').length;
  document.getElementById('st').textContent = reports.length;
  const pb = document.getElementById('pb');
  if (pb) { pb.textContent = p; pb.style.display = p > 0 ? 'inline-block' : 'none'; }
}

function render() {
  const list = filter === 'all' ? reports : reports.filter(r => r.status === filter);

  if (!list.length) {
    $rl.innerHTML = `<div class="es"><p>No ${filter==='all'?'':filter} reports</p></div>`;
    return;
  }

  $rl.innerHTML = list.map(r => card(r)).join('');

  // Attach event listeners
  $rl.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      const id2 = btn.dataset.id2;
      const name = btn.dataset.name;
      if (action === 'dismiss') dismissReport(id);
      else if (action === 'reopen') reopenReport(id);
      else if (action === 'delpost') deleteContent('post', id, id2);
      else if (action === 'delcomment') deleteContent('comment', id, id2);
      else if (action === 'ban') banUser(id, id2, name);
    });
  });
}

function card(r) {
  const type = r.reported_post_id ? 'post' : r.reported_comment_id ? 'comment' : 'user';
  const reason = r.reason.replace(/_/g, ' ');
  const time = new Date(r.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
  const reporter = r.reporter?.username || r.reporter?.full_name || 'Unknown';
  const reported = r.reported_user?.username || r.reported_user?.full_name || 'Unknown';
  const banned = r.reported_user?.is_banned;
  const pending = r.status === 'pending';

  let content = '';
  if (type === 'post' && r.reported_post) {
    const txt = r.reported_post.content || '(no caption)';
    const imgs = r.reported_post.media_urls?.length || 0;
    content = `<div class="rcb"><div class="rcl">Reported post</div><div class="rct">${esc(txt)}</div>${imgs?`<div style="margin-top:8px;font-size:12px;color:var(--t3)">Post has ${imgs} image(s)</div>`:''}</div>`;
  } else if (type === 'comment' && r.reported_comment) {
    content = `<div class="rcb"><div class="rcl">Reported comment</div><div class="rct">${esc(r.reported_comment.content||'(empty)')}</div></div>`;
  } else if (type === 'user') {
    content = `<div class="rcb"><div class="rcl">Reported user</div><div class="rct">@${esc(reported)}</div></div>`;
  }

  const actions = pending ? `
    <div class="ra">
      <button class="btn btn-g btn-sm" data-action="dismiss" data-id="${r.id}">Dismiss</button>
      ${type==='post'&&r.reported_post_id?`<button class="btn btn-d btn-sm" data-action="delpost" data-id="${r.reported_post_id}" data-id2="${r.id}">Delete Post</button>`:''}
      ${type==='comment'&&r.reported_comment_id?`<button class="btn btn-d btn-sm" data-action="delcomment" data-id="${r.reported_comment_id}" data-id2="${r.id}">Delete Comment</button>`:''}
      ${r.reported_user_id&&!banned?`<button class="btn btn-b btn-sm" data-action="ban" data-id="${r.reported_user_id}" data-id2="${r.id}" data-name="${esc(reported)}">Ban @${esc(reported)}</button>`:''}
      ${banned?'<span style="font-size:12px;color:var(--rd);padding:6px 14px">User is banned</span>':''}
    </div>` : `
    <div class="ra">
      <span style="font-size:12px;color:var(--t3);padding:6px 0">Status: ${r.status}</span>
      ${r.status==='dismissed'?`<button class="btn btn-g btn-sm" data-action="reopen" data-id="${r.id}">Reopen</button>`:''}
    </div>`;

  return `<div class="rc">
    <div class="rh">
      <div class="rm">
        <span class="rt ${type}">${type}</span>
        <span class="rr"><strong>${reason}</strong></span>
        <span class="rti">${time}</span>
      </div>
      <span class="rs ${r.status}">${r.status}</span>
    </div>
    <div class="rb">
      <div class="ru"><span>By: <strong>@${esc(reporter)}</strong></span><span>Against: <strong>@${esc(reported)}</strong>${banned?' <span style="color:var(--rd);font-size:11px">(BANNED)</span>':''}</span></div>
      ${r.description?`<div class="rde">"${esc(r.description)}"</div>`:''}
      ${content}
    </div>
    ${actions}
  </div>`;
}

// Actions
async function dismissReport(id) {
  const { error } = await sb.from('reports').update({ status: 'dismissed' }).eq('id', id);
  if (error) return toast('Error: ' + error.message, true);
  toast('Report dismissed');
  loadReports();
}

async function reopenReport(id) {
  const { error } = await sb.from('reports').update({ status: 'pending' }).eq('id', id);
  if (error) return toast('Error: ' + error.message, true);
  toast('Report reopened');
  loadReports();
}

function deleteContent(type, contentId, reportId) {
  confirm(`Delete ${type}?`, `This will permanently delete this ${type}. Cannot be undone.`, async () => {
    const { error: e1 } = await sb.from(type === 'post' ? 'posts' : 'comments').delete().eq('id', contentId);
    if (e1) return toast('Error: ' + e1.message, true);
    await sb.from('reports').update({ status: 'actioned' }).eq('id', reportId);
    toast(`${type} deleted`);
    loadReports();
  });
}

function banUser(userId, reportId, name) {
  confirm(`Ban @${name}?`, 'This user will be banned from the platform.', async () => {
    const { error: e1 } = await sb.from('profiles').update({ is_banned: true }).eq('id', userId);
    if (e1) return toast('Error: ' + e1.message, true);
    await sb.from('reports').update({ status: 'actioned' }).eq('id', reportId);
    toast(`@${name} banned`);
    loadReports();
  });
}

// UI
function toast(msg, err = false) {
  $toast.textContent = msg;
  $toast.className = err ? 'toast err' : 'toast';
  $toast.style.display = 'block';
  setTimeout(() => $toast.style.display = 'none', 3000);
}

function confirm(title, msg, fn) {
  document.getElementById('ct').textContent = title;
  document.getElementById('cm').textContent = msg;
  $cov.classList.add('show');
  confirmFn = fn;
}

document.getElementById('ccn').addEventListener('click', () => {
  $cov.classList.remove('show');
  confirmFn = null;
});

document.getElementById('cok').addEventListener('click', async () => {
  if (confirmFn) {
    const btn = document.getElementById('cok');
    btn.disabled = true;
    btn.textContent = 'Processing...';
    await confirmFn();
    btn.disabled = false;
    btn.textContent = 'Confirm';
    $cov.classList.remove('show');
    confirmFn = null;
  }
});

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
checkSession();
</script>

</body>
</html>
